name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Ruby version comes from .tool-versions -- the single source of truth,
      # shared with local mise. setup-ruby downloads a prebuilt in seconds and
      # caches gems; the bundler version is taken from Gemfile.lock's
      # BUNDLED WITH.
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .tool-versions
          bundler-cache: true

      # Node + pnpm are required for the esbuild frontend bundle that every test
      # builds. Matches the Heroku nodejs buildpack (package.json engines: node
      # >=22, packageManager: pnpm).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build test (gem + node compatibility + output)
        run: bundle exec ruby test/build_test.rb

      - name: Dev server smoke test (bridgetown start)
        run: bundle exec ruby test/server_test.rb

      - name: Production serving smoke test (puma + config.ru)
        run: bundle exec ruby test/production_test.rb
